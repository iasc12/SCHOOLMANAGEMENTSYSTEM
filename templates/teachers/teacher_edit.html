{% extends "base.html" %}

{% block title %}
Edit Teacher
{% endblock %}


{% block content %}


<div class="form-card">


    <div class="page-header">


        <div>

            <h2>
                <i class="fas fa-user-pen text-primary"></i>
                Edit Teacher
            </h2>


            <p>
                Update teacher information.
            </p>

        </div>


    </div>



    <form method="POST">


        {% csrf_token %}



        <div class="row g-4">


            {% for field in form %}


            <div class="col-md-6">


                <label class="form-label">

                    {{ field.label }}

                </label>



                {{ field }}



                {% if field.errors %}


                    <div class="text-danger">

                        {{ field.errors }}

                    </div>


                {% endif %}



            </div>


            {% endfor %}



        </div>




        <div class="mt-4">


            <button type="submit" class="btn btn-success">


                <i class="fas fa-save"></i>

                Save Changes


            </button>



            <a href="{% url 'teacher_list' %}" 
               class="btn btn-secondary">


                <i class="fas fa-arrow-left"></i>

                Back


            </a>


        </div>




    </form>



</div>


{% endblock %}
