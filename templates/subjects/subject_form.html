{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card">

        <div class="card-header bg-primary text-white">

            <h3>Subject Form</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Save Subject
                </button>

                <a href="{% url 'subject_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
