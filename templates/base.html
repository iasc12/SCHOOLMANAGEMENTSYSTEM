<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School Management System{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Top Navigation -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">
                School Management System
            </span>

            {% if request.user.is_authenticated %}
                <span class="text-white">
                    Welcome {{ request.user.username }}
                </span>
            {% endif %}
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

                <h4>Menu</h4>
                <hr>

                <a href="{% url 'admin_dashboard' %}" class="btn btn-primary w-100 mb-2">
                    Dashboard
                </a>

                <a href="#" class="btn btn-outline-light w-100 mb-2">
                    Students
                </a>

                <a href="#" class="btn btn-outline-light w-100 mb-2">
                    Teachers
                </a>

                <a href="#" class="btn btn-outline-light w-100 mb-2">
                    Workers
                </a>

                <a href="#" class="btn btn-outline-light w-100 mb-2">
                    Classes
                </a>

                <a href="#" class="btn btn-outline-light w-100 mb-2">
                    Subjects
                </a>

                <a href="{% url 'logout' %}" class="btn btn-danger w-100 mt-5">
                    Logout
                </a>

            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">

                {% block content %}
                {% endblock %}

            </div>

        </div>
    </div>

</body>
</html>
