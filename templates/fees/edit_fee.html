{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="dashboard-header">

        <h2>✏️ Edit Fee</h2>

    </div>


    <div class="card p-4">


        <form method="POST">

            {% csrf_token %}


            {{ form.as_p }}


            <button class="btn btn-success">

                Update Fee

            </button>


            <a href="{% url 'fee_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>


        </form>


    </div>


</div>


{% endblock %}
