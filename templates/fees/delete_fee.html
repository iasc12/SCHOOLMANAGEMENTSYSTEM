{% extends "base.html" %}

{% block content %}

<div class="container">


    <div class="card p-4">


        <h3>
            Delete Fee Record?
        </h3>


        <p>
            Are you sure you want to delete this fee for:

            <strong>
                {{ fee.student.first_name }}
                {{ fee.student.last_name }}
            </strong>
        </p>



        <form method="POST">

            {% csrf_token %}


            <button class="btn btn-danger">

                Yes, Delete

            </button>


            <a href="{% url 'fee_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>


        </form>


    </div>


</div>


{% endblock %}
