<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.header{
    background:#0d6efd;
    color:white;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h1{
    margin:0;
    color:#0d6efd;
}

.menu{
    margin-top:40px;
}

.menu a{
    display:inline-block;
    padding:12px 20px;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    border-radius:6px;
    margin-right:10px;
    margin-bottom:10px;
}

.menu a:hover{
    background:#084298;
}

    </style>

</head>
<body>

<div class="header">
<h2>School Management System</h2>
<p>Welcome {{ request.user.username }}</p>
</div>

<div class="container">

<div class="cards">

<div class="card">
<h3>Students</h3>
<h1>{{ students }}</h1>
</div>

<div class="card">
<h3>Teachers</h3>
<h1>{{ teachers }}</h1>
</div>

<div class="card">
<h3>Workers</h3>
<h1>{{ workers }}</h1>
</div>

<div class="card">
<h3>Classes</h3>
<h1>{{ classes }}</h1>
</div>

</div>

<div class="menu">

<a href="/students/">Manage Students</a>

<a href="#">Manage Teachers</a>

<a href="#">Manage Workers</a>

<a href="#">Manage Classes</a>

</div>

</div>

</body>
</html>
