{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card border-danger">

        <div class="card-header bg-danger text-white">
            <h3>Delete Class</h3>
        </div>

        <div class="card-body">

            <p>
                Are you sure you want to delete
                <strong>{{ school_class.name }}</strong>?
            </p>

            <form method="POST">

                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>

                <a href="{% url 'class_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
