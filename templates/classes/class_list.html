{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="d-flex justify-content-between mb-3">
        <h2>Classes</h2>

        <a href="{% url 'add_class' %}" class="btn btn-primary">
            Add Class
        </a>
    </div>

    <form method="get" class="mb-3">
        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search class..."
            value="{{ search }}"
        >
    </form>

    <table class="table table-bordered table-striped">

        <thead>

            <tr>
                <th>Name</th>
                <th>Section</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody>

        {% for class in classes %}

            <tr>

                <td>{{ class.name }}</td>

                <td>{{ class.section }}</td>

                <td>

                    <a href="{% url 'class_detail' class.id %}"
                       class="btn btn-info btn-sm">
                        View
                    </a>

                    <a href="{% url 'edit_class' class.id %}"
                       class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a href="{% url 'delete_class' class.id %}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="3">
                    No classes found.
                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
