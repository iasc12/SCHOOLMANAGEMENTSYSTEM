{% extends "base.html" %}

{% block title %}Student Form{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header bg-primary text-white">
        <h4>Student Form</h4>
    </div>

    <div class="card-body">

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">
                Save Student
            </button>

            <a href="{% url 'student_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
